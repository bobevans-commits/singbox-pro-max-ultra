name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had any activity for 30 days.
            It will be closed in 7 days if no further activity occurs.
            If this issue is still relevant, please leave a comment to keep it open.
            此 Issue 已因 30 天无活动被自动标记为 stale，7 天后将被关闭。如果仍然相关，请留言保持开启。

          close-issue-message: |
            This issue has been automatically closed due to inactivity.
            If this is still relevant, please reopen it or create a new issue.
            此 Issue 已因无活动被自动关闭。如果仍然相关，请重新打开或创建新 Issue。

          stale-issue-label: 'stale'
          days-before-issue-stale: 30
          days-before-issue-close: 7

          # Pull Requests
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had any activity for 45 days.
            It will be closed in 14 days if no further activity occurs.
            If this PR is still being worked on, please leave a comment to keep it open.
            此 PR 已因 45 天无活动被自动标记为 stale，14 天后将被关闭。如果仍在进行中，请留言保持开启。

          close-pr-message: |
            This PR has been automatically closed due to inactivity.
            If you'd like to continue working on this, please reopen it.
            此 PR 已因无活动被自动关闭。如果你想继续，请重新打开。

          stale-pr-label: 'stale'
          days-before-pr-stale: 45
          days-before-pr-close: 14

          # Exempt labels
          exempt-issue-labels: 'pinned,security,bug,enhancement,help wanted'
          exempt-pr-labels: 'pinned,security,work in progress'
          exempt-draft-pr: true

          # Operations per run
          operations-per-run: 50
          remove-stale-when-updated: true
          delete-branch: false
