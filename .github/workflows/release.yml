name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      platforms:
        description: 'Platforms to build (comma-separated: windows,macos,linux,android)'
        required: false
        default: 'windows,macos,linux,android'

env:
  FLUTTER_VERSION: '3.24.0'
  APP_NAME: 'ProxyClient'
  SINGBOX_VERSION: '1.10.0'

jobs:
  # ========== Windows Build ==========
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'windows')
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Download sing-box
        shell: pwsh
        run: |
          mkdir -p assets/bin
          $url = "https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "sing-box.zip"
          Expand-Archive -Path "sing-box.zip" -DestinationPath "assets/bin/" -Force
          Move-Item -Path "assets/bin/sing-box-*/sing-box.exe" -Destination "assets/bin/sing-box.exe" -Force
          Remove-Item -Path "assets/bin/sing-box-*" -Recurse -Force

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          mkdir dist
          xcopy /E /I /Y build\windows\x64\runner\Release\* dist\
          copy assets\bin\sing-box.exe dist\

          $version = "${{ github.event.inputs.version || 'dev' }}"
          $zipName = "${{ env.APP_NAME }}-windows-x64-$version.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ARTIFACT_NAME=$zipName" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 90

  # ========== macOS Build ==========
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'macos')
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Download sing-box (universal)
        run: |
          mkdir -p assets/bin

          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-darwin-amd64.tar.gz -o sing-box-amd64.tar.gz
          tar -xzf sing-box-amd64.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box-x86_64
          rm -rf sing-box-* sing-box-amd64.tar.gz

          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-darwin-arm64.tar.gz -o sing-box-arm64.tar.gz
          tar -xzf sing-box-arm64.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box-arm64
          rm -rf sing-box-* sing-box-arm64.tar.gz

          chmod +x assets/bin/sing-box-x86_64 assets/bin/sing-box-arm64

      - name: Build Flutter macOS
        run: flutter build macos --release

      - name: Package DMG
        run: |
          mkdir dist
          cp -R build/macos/Build/Products/Release/${{ env.APP_NAME }}.app dist/
          cp assets/bin/sing-box-x86_64 dist/${{ env.APP_NAME }}.app/Contents/MacOS/sing-box-x86_64
          cp assets/bin/sing-box-arm64 dist/${{ env.APP_NAME }}.app/Contents/MacOS/sing-box-arm64

          cat > dist/${{ env.APP_NAME }}.app/Contents/MacOS/sing-box <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            exec "$DIR/sing-box-arm64" "$@"
          else
            exec "$DIR/sing-box-x86_64" "$@"
          fi
          EOF
          chmod +x dist/${{ env.APP_NAME }}.app/Contents/MacOS/sing-box

          VERSION="${{ github.event.inputs.version || 'dev' }}"
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dist -ov -format UDZO ${{ env.APP_NAME }}-macos-universal-${VERSION}.dmg
          echo "ARTIFACT_NAME=${{ env.APP_NAME }}-macos-universal-${VERSION}.dmg" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 90

  # ========== Linux Build ==========
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'linux')
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Download sing-box
        run: |
          mkdir -p assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-linux-amd64.tar.gz -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box
          chmod +x assets/bin/sing-box
          rm -rf sing-box-* sing-box.tar.gz

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Package AppImage
        run: |
          mkdir dist
          cp -r build/linux/x64/release/bundle/* dist/
          cp assets/bin/sing-box dist/
          chmod +x dist/proxy_client dist/sing-box

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          cp -r dist/* AppDir/usr/bin/

          [ -f assets/icons/icon.png ] && cp assets/icons/icon.png AppDir/AppIcon.png || true

          cat > AppDir/${{ env.APP_NAME }}.desktop << 'DESKTOP_EOF'
          [Desktop Entry]
          Name=ProxyClient
          Exec=proxy_client
          Icon=AppIcon
          Type=Application
          Categories=Network;Utility;
          Comment=Multi-platform proxy client
          Terminal=false
          DESKTOP_EOF

          ./appimagetool-x86_64.AppImage AppDir
          VERSION="${{ github.event.inputs.version || 'dev' }}"
          mv *.AppImage ${{ env.APP_NAME }}-linux-x86_64-${VERSION}.AppImage
          echo "ARTIFACT_NAME=${{ env.APP_NAME }}-linux-x86_64-${VERSION}.AppImage" >> $GITHUB_ENV

      - name: Package tar.gz
        run: |
          VERSION="${{ github.event.inputs.version || 'dev' }}"
          tar -czf ${{ env.APP_NAME }}-linux-x86_64-${VERSION}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            ${{ env.ARTIFACT_NAME }}
            ${{ env.APP_NAME }}-linux-x86_64-*.tar.gz
          retention-days: 90

  # ========== Android Build ==========
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'android')
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Android signing
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 90

  # ========== Create GitHub Release ==========
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-windows, build-macos, build-linux, build-android]
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ] || \
             echo "$VERSION" | grep -qE '-alpha|-beta|-rc|-pre|-dev'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: artifacts/*
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## ${{ env.APP_NAME }} ${{ steps.version.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (x64) | `ProxyClient-windows-x64-*.zip` |
            | macOS (Universal) | `ProxyClient-macos-universal-*.dmg` |
            | Linux (x86_64) | `ProxyClient-linux-x86_64-*.AppImage` / `*.tar.gz` |
            | Android (ARM64) | `app-arm64-v8a-release.apk` |
            | Android (x86_64) | `app-x86_64-release.apk` |

            ### Installation
            - **Windows**: Download ZIP, extract, run `proxy_client.exe`
            - **macOS**: Download DMG, drag to Applications, right-click > Open on first launch
            - **Linux**: Download AppImage, `chmod +x`, then run; or extract tar.gz
            - **Android**: Download APK, enable install from unknown sources

            ### Included
            - sing-box v${{ env.SINGBOX_VERSION }}
            - Flutter v${{ env.FLUTTER_VERSION }}

            ### Notes
            - Windows/macOS: Run as Administrator / with sudo for TUN mode
            - macOS Universal binary supports both Intel and Apple Silicon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
