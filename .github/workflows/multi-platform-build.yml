# Multi-Platform Build Pipeline

name: Multi-Platform Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'
      platforms:
        description: 'Platforms to build (comma-separated: windows,macos,linux,android)'
        required: false
        default: 'windows,macos,linux,android'

env:
  FLUTTER_VERSION: '3.24.0'
  APP_NAME: 'ProxyClient'
  SINGBOX_VERSION: '1.10.0'

jobs:
  # ========== Windows Build ==========
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'windows')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get Dependencies
        run: flutter pub get
      
      - name: Download sing-box
        shell: pwsh
        run: |
          mkdir -p assets/bin
          $url = "https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "sing-box.zip"
          Expand-Archive -Path "sing-box.zip" -DestinationPath "assets/bin/" -Force
          Move-Item -Path "assets/bin/sing-box-*/sing-box.exe" -Destination "assets/bin/sing-box.exe" -Force
          Remove-Item -Path "assets/bin/sing-box-*" -Recurse -Force
      
      - name: Build Flutter
        run: flutter build windows --release
      
      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          xcopy /E /I /Y build\windows\x64\runner\Release\* dist\
          copy assets\bin\sing-box.exe dist\
          $version = "${{ github.event.inputs.version || 'dev' }}"
          $zipName = "${{ env.APP_NAME }}-windows-x64-$version.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ARTIFACT_NAME=$zipName" >> $env:GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ env.ARTIFACT_NAME }}

  # ========== macOS Build ==========
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'macos')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get Dependencies
        run: flutter pub get
      
      - name: Download sing-box
        run: |
          mkdir -p assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-darwin-amd64.tar.gz -o sing-box-amd64.tar.gz
          tar -xzf sing-box-amd64.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box-x86_64
          rm -rf sing-box-* sing-box-amd64.tar.gz
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-darwin-arm64.tar.gz -o sing-box-arm64.tar.gz
          tar -xzf sing-box-arm64.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box-arm64
          rm -rf sing-box-* sing-box-arm64.tar.gz
      
      - name: Build Flutter
        run: flutter build macos --release
      
      - name: Package DMG
        run: |
          mkdir dist
          cp -R build/macos/Build/Products/Release/ProxyClient.app dist/
          cp assets/bin/sing-box-x86_64 dist/ProxyClient.app/Contents/MacOS/sing-box-x86_64
          cp assets/bin/sing-box-arm64 dist/ProxyClient.app/Contents/MacOS/sing-box-arm64
          
          # Create DMG
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dist -ov -format UDZO ${{ env.APP_NAME }}-macos-universal.dmg
          echo "ARTIFACT_NAME=${{ env.APP_NAME }}-macos-universal.dmg" >> $GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.ARTIFACT_NAME }}

  # ========== Linux Build ==========
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'linux')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get Dependencies
        run: flutter pub get
      
      - name: Download sing-box
        run: |
          mkdir -p assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-linux-amd64.tar.gz -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box
          rm -rf sing-box-* sing-box.tar.gz
      
      - name: Build Flutter
        run: flutter build linux --release
      
      - name: Package AppImage
        run: |
          mkdir dist
          cp -r build/linux/x64/release/bundle/* dist/
          cp assets/bin/sing-box dist/
          
          # Download appimagetool
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp -r dist/* AppDir/usr/bin/
          cp assets/icons/icon.png AppDir/AppIcon.png 2>/dev/null || echo "No icon found"
          
          # Create desktop file (no leading whitespace)
          cat > AppDir/${{ env.APP_NAME }}.desktop << 'DESKTOP_EOF'
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Type=Application
          Categories=Network;Utility;
          DESKTOP_EOF
          
          # Build AppImage
          ./appimagetool-x86_64.AppImage AppDir
          mv *.AppImage ${{ env.APP_NAME }}-linux-x86_64.AppImage
          echo "ARTIFACT_NAME=${{ env.APP_NAME }}-linux-x86_64.AppImage" >> $GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ env.ARTIFACT_NAME }}

  # ========== Android Build ==========
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    if: github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'android')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get Dependencies
        run: flutter pub get
      
      - name: Download sing-box for Android
        run: |
          mkdir -p assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-android-aarch64.tar.gz -o sing-box-arm64.tar.gz
          tar -xzf sing-box-arm64.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box-arm64
          rm -rf sing-box-* sing-box-arm64.tar.gz
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-android-x86_64.tar.gz -o sing-box-x64.tar.gz
          tar -xzf sing-box-x64.tar.gz
          mv sing-box-*/sing-box assets/bin/sing-box-x86_64
          rm -rf sing-box-* sing-box-x64.tar.gz
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Build App Bundle
        run: flutter build appbundle --release
      
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  # ========== Create Release ==========
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-windows, build-macos, build-linux, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          merge-multiple: true
          path: artifacts
      
      - name: List artifacts
        run: ls -la artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
