# Multi-Platform Build Pipeline

name: Multi-Platform Build

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'
      platforms:
        description: 'Platforms to build (comma-separated: windows,macos,linux,android)'
        required: false
        default: 'windows,macos,linux,android'

env:
  FLUTTER_VERSION: '3.24.0'
  RUST_VERSION: '1.80.0'
  APP_NAME: 'ProxyClient'
  RUST_CORE_DIR: 'rust_core'
  FLUTTER_UI_DIR: 'flutter_ui'

jobs:
  # ========== Windows Build ==========
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.platforms, 'windows') }} || github.event_name != 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: ${{ env.RUST_VERSION }}
          target: x86_64-pc-windows-msvc
      
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.RUST_CORE_DIR }}
          prefix-key: "win-rust"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Get Dependencies
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Build Rust Core
        run: cargo build --release
        working-directory: ${{ env.RUST_CORE_DIR }}
      
      - name: Download sing-box
        shell: pwsh
        run: |
          mkdir -p flutter_ui/assets/bin
          $url = "https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-1.10.0-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "sing-box.zip"
          Expand-Archive -Path "sing-box.zip" -DestinationPath "flutter_ui/assets/bin/" -Force
      
      - name: Build Flutter
        run: flutter build windows --release
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          xcopy /E /I /Y flutter_ui\build\windows\x64\runner\Release\* dist\
          copy flutter_ui\assets\bin\sing-box*.exe dist\
          $version = "${{ github.event.inputs.version || 'dev' }}"
          $zipName = "${{ env.APP_NAME }}-windows-x64-$version.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ARTIFACT_NAME=$zipName" >> $env:GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ env.ARTIFACT_NAME }}

  # ========== macOS Build ==========
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.platforms, 'macos') }} || github.event_name != 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: ${{ env.RUST_VERSION }}
          target: x86_64-apple-darwin,aarch64-apple-darwin
      
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.RUST_CORE_DIR }}
          prefix-key: "mac-rust"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Get Dependencies
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Build Rust Core (Universal)
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p target/universal
          lipo -create \
            target/x86_64-apple-darwin/release/libproxy_client.dylib \
            target/aarch64-apple-darwin/release/libproxy_client.dylib \
            -output target/universal/libproxy_client.dylib
        working-directory: ${{ env.RUST_CORE_DIR }}
      
      - name: Download sing-box
        run: |
          mkdir -p flutter_ui/assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-1.10.0-darwin-amd64.tar.gz -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz -C flutter_ui/assets/bin/
      
      - name: Build Flutter
        run: flutter build macos --release
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Package DMG
        run: |
          mkdir dist
          cp -R flutter_ui/build/macos/Build/Products/Release/ProxyClient.app dist/
          cp flutter_ui/assets/bin/sing-box dist/ProxyClient.app/Contents/MacOS/
          
          # Create DMG
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dist -ov -format UDZO ${{ env.APP_NAME }}-macos-universal.dmg
          echo "ARTIFACT_NAME=${{ env.APP_NAME }}-macos-universal.dmg" >> $GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.ARTIFACT_NAME }}

  # ========== Linux Build ==========
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.platforms, 'linux') }} || github.event_name != 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: ${{ env.RUST_VERSION }}
          target: x86_64-unknown-linux-gnu
      
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.RUST_CORE_DIR }}
          prefix-key: "linux-rust"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Get Dependencies
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Build Rust Core
        run: cargo build --release
        working-directory: ${{ env.RUST_CORE_DIR }}
      
      - name: Download sing-box
        run: |
          mkdir -p flutter_ui/assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-1.10.0-linux-amd64.tar.gz -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz -C flutter_ui/assets/bin/
      
      - name: Build Flutter
        run: flutter build linux --release
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Package AppImage
        run: |
          mkdir dist
          cp -r flutter_ui/build/linux/x64/release/bundle/* dist/
          cp flutter_ui/assets/bin/sing-box dist/
          
          # Download appimagetool
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp -r dist/* AppDir/usr/bin/
          cp flutter_ui/assets/icon.png AppDir/AppIcon.png 2>/dev/null || echo "No icon found"
          
          # Create desktop file
          cat > AppDir/${{ env.APP_NAME }}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Type=Application
          Categories=Network;Utility;
          EOF
          
          # Build AppImage
          ./appimagetool-x86_64.AppImage AppDir
          mv *.AppImage ${{ env.APP_NAME }}-linux-x86_64.AppImage
          echo "ARTIFACT_NAME=${{ env.APP_NAME }}-linux-x86_64.AppImage" >> $GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ env.ARTIFACT_NAME }}

  # ========== Android Build ==========
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.platforms, 'android') }} || github.event_name != 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: ${{ env.RUST_VERSION }}
          target: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      
      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Get Dependencies
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Build Rust Core for Android
        run: |
          cargo ndk --target aarch64-linux-android --target armv7-linux-androideabi --target x86_64-linux-android -o flutter_ui/android/app/src/main/jniLibs build --release
        working-directory: ${{ env.RUST_CORE_DIR }}
      
      - name: Download sing-box for Android
        run: |
          mkdir -p flutter_ui/assets/bin
          curl -L https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-1.10.0-android-aarch64.tar.gz -o sing-box-arm64.tar.gz
          tar -xzf sing-box-arm64.tar.gz -C flutter_ui/assets/bin/
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Build App Bundle
        run: flutter build appbundle --release
        working-directory: ${{ env.FLUTTER_UI_DIR }}
      
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            ${{ env.FLUTTER_UI_DIR }}/build/app/outputs/flutter-apk/*.apk
            ${{ env.FLUTTER_UI_DIR }}/build/app/outputs/bundle/release/*.aab

  # ========== Create Release ==========
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-windows, build-macos, build-linux, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          merge-multiple: true
          path: artifacts
      
      - name: List artifacts
        run: ls -la artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          body: |
            ## Proxy Client ${{ github.ref_name }}
            
            ### Downloads
            - **Windows**: `ProxyClient-windows-x64-*.zip`
            - **macOS**: `ProxyClient-macos-universal.dmg`
            - **Linux**: `ProxyClient-linux-x86_64.AppImage`
            - **Android**: `*-armeabi-v7a.apk`, `*-arm64-v8a.apk`, `*-x86_64.apk`
            
            ### Installation
            #### Windows
            1. Extract the ZIP file
            2. Run `proxy_client.exe`
            
            #### macOS
            1. Open the DMG file
            2. Drag to Applications folder
            
            #### Linux
            1. Make executable: `chmod +x ProxyClient-*.AppImage`
            2. Run: `./ProxyClient-*.AppImage`
            
            #### Android
            1. Install the APK for your architecture
            2. Grant necessary permissions
            
            ### Features
            - ✅ sing-box core integration
            - ✅ TUN mode support
            - ✅ Multiple protocol support (Hysteria2, TUIC, REALITY, etc.)
            - ✅ Rule-based routing
            - ✅ Split DNS with DoH/DoT/DoQ
            
            ### Changelog
            Auto-generated release from CI/CD pipeline.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
