name: Android Build

on:
  push:
    branches: [main, dev, develop]
    tags: ['v*']
    paths:
      - 'android/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'lib/**'
      - 'pubspec.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: 'dev'

env:
  SINGBOX_VERSION: '1.10.0'
  FLUTTER_VERSION: '3.x'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download kernels (Android)
        continue-on-error: true
        run: |
          chmod +x scripts/download_kernels.sh
          mkdir -p assets/bin
          bash scripts/download_kernels.sh ./assets/bin android arm64
          bash scripts/download_kernels.sh ./assets/bin android amd64

      - name: Setup Android signing
        if: ${{ env.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
