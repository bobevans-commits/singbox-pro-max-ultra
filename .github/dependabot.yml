version: 2

updates:
  # Flutter/Dart dependencies
  - package-ecosystem: 'pub'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'dart'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    reviewers:
      - 'bobevans-commits'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci(deps)'

  # Gradle (Android)
  - package-ecosystem: 'gradle'
    directory: '/android'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'android'
    commit-message:
      prefix: 'chore(android-deps)'
