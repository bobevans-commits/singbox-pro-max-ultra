name: universal_proxy_party
description: A cross-platform proxy GUI application supporting sing-box, v2ray-core, and mihomo kernels.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  http: ^1.1.0
  
  # Process Management
  process_run: ^0.12.5+1
  
  # Path Utilities
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # File Watching
  watcher: ^1.1.0
  
  # Archive/Compression (for binary downloads)
  archive: ^3.4.9
  
  # HTTP Server (for local API proxying)
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  
  # System Tray
  tray_manager: ^0.2.1
  
  # Window Management
  window_manager: ^0.3.6
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Logging
  logger: ^2.0.2+1
  
  # Dio for advanced HTTP
  dio: ^5.4.0
  
  # Crypto for checksums
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/configs/
