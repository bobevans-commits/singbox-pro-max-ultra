name: proxy_client_ui
description: 多平台代理客户端界面 - 支持 Windows/macOS/Linux/Android
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  http: ^1.1.0
  json_annotation: ^4.8.0
  shared_preferences: ^2.2.0
  file_picker: ^6.0.0
  url_launcher: ^6.1.0
  system_tray: ^2.0.0
  window_manager: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
